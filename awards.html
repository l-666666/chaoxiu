<html>

	</head>
	<body>

<div class="nav">

  <a href="../js/classicline.html">商品页面</a >

<!-- 标题 -->
<div class="title-box">
  <h1>用户反馈中心</h1>
  <p>感谢您的宝贵意见，我们会不断改进</p >
</div>

<!-- 反馈表单 -->
<div class="feedback-form">
  <div class="form-item">
    <label>您的称呼</label>
    <input type="text" placeholder="请输入昵称">
  </div>

  <div class="form-item">
    <label>满意度评分</label>
    <div class="star-box">
      <span class="star">★</span>
      <span class="star">★</span>
      <span class="star">★</span>
      <span class="star">★</span>
      <span class="star">★</span>
    </div>
  </div>

  <div class="form-item">
    <label>反馈内容</label>
    <textarea placeholder="请写下您的体验、建议或问题..."></textarea>
  </div>

  <button class="submit-btn">提交反馈</button>
</div>

<!-- 历史反馈 -->
<div class="feedback-list">
  <div class="feedback-item">
    <div class="name">刺绣爱好者</div>
    <div class="time">2026-04-05</div>
    <div class="content">DIY画图功能很好用，线稿很清晰，希望能多更新一些传统纹样。</div>
  </div>

  <div class="feedback-item">
    <div class="name">潮绣新手</div>
    <div class="time">2026-04-03</div>
    <div class="content">商品质量很好，客服回复很快，整体体验非常满意。</div>
  </div>
</div>

<!-- 底部 -->
<div class="footer">
  潮绣DIY非遗传承 &copy; 2025 用户反馈页面
</div>

<script>
// 简单星级评分效果
const stars = document.querySelectorAll('.star');
stars.forEach((s,i)=>{
  s.onclick = ()=>{
    stars.forEach((ss,j)=>{
      ss.classList.toggle('active', j<=i);
    });
  }
});

// 提交提示
document.querySelector('.submit-btn').onclick = ()=>{
  alert('反馈提交成功！感谢您的支持');
}
</script>
	</body>
</html>
