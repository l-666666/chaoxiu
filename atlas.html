			<div class="canvas-wrap">
				<canvas id="drawcan" width="860" height="500"></canvas>
			</div>
			<div class="tool-bar">
			<label>颜色:</label>
			<input type="color" id="colorp" value="#000000">
			<label>粗细：</label>
			<input type="range" id="lineWidth" min="1" max="30" value="3">
			<label>文字：</label>
			<input type="text" id="textInput" placeholder="输入要写的字">
			<button id="clearBtn">清空画板</button>
			<button id="clearBtn">保存图片</button>
			<button id="clearBtn">上传图片</button>
			<button id="clearBtn">输入文字</button>
			</div>
		
			</div>
			<script>
		    const canvas =
			 document.getElementById('drawCanvas');
		    const ctx = canvas.getContext('2d');
		    const colorPicker = document.getElementById('colorPicker');
		    const lineWidth = document.getElementById('lineWidth');
		    const textInput = document.getElementById('textInput');
		    const clearBtn = document.getElementById('clearBtn');
		    const saveBtn = document.getElementById('saveBtn');
		    let isDrawing = false;
		   
		    canvas.addEventListener('mousedown', () => {
		      isDrawing = true;
		      ctx.beginPath();
		    });
		    canvas.addEventListener('mousemove', (e) => {
		      if(!isDrawing) return;
		      ctx.strokeStyle = colorPicker.value;
		      ctx.lineWidth = lineWidth.value;
		      ctx.lineCap = 'round';
		      ctx.lineTo(e.offsetX, e.offsetY);
		      ctx.stroke();
		    });
		    canvas.addEventListener('mouseup', () => isDrawing = false);
		    canvas.addEventListener('mouseleave', () => isDrawing = false);
		   
		    canvas.addEventListener('click', (e) => {
		      const text = textInput.value.trim();
		      if(!text) return; // 没输入文字就不执行
		      // 设置文字样式
		      ctx.font = '28px 微软雅黑';
		      ctx.fillStyle = colorPicker.value; // 用选好的颜色写字
		      ctx.fillText(text, e.offsetX, e.offsetY); // 在点击位置写字
		    });
		 
		    clearBtn.addEventListener('click', () => {
		      ctx.clearRect(0, 0, canvas.width, canvas.height);
		    });
		    
		    saveBtn.addEventListener('click', () => {
		      const link = document.createElement('a');
		      link.download = '潮绣DIY图案.png';
		      link.href = canvas.toDataURL('image/png');
		      link.click();
		    });
			
			 </script>
